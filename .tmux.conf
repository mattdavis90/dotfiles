unbind C-b
set -g prefix C-a
set -g mouse

# set -g focus-events on
set -g status-style bg=default
set -g status-justify absolute-centre
set -g status-left-length 90
set -g status-right-length 150
set -g status-left '#(cat #{socket_path}-\#{session_id}-vimbridge)'
# set -g status-right "#(who | cut -d' ' -f1)@#(hostname) %d %b %R | #{battery_icon} #{battery_percentage} #{battery_remain} #(cat #{socket_path}-\#{session_id}-vimbridge-R)"
set -g status-right '#{battery_icon} #{battery_percentage} #{battery_remain} #(cat #{socket_path}-\#{session_id}-vimbridge-R)'

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm*:Tc"

set -g @plugin 'mattdavis90/base16-tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

source-file $HOME/.config/tinted-theming/tmux.base16.conf
set -g @continuum-restore 'on'

# Run all plugins' scripts
run '~/.tmux/plugins/tpm/tpm'
